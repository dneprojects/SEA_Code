name: Build & publish app

# Builds multi-arch images with the current Home Assistant builder composite
# actions, publishes a generic multi-arch manifest to GHCR, and pushes the app
# metadata to the public install repository (SAE_App).
# Docs: https://developers.home-assistant.io/docs/apps/publishing
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_REPO: dneprojects/SAE_App
  ADDON_SLUG: smart_energy_agent

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      version: ${{ steps.normalize.outputs.version }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Get app information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "."

      - name: Normalize app information
        id: normalize
        run: |
          image=${{ steps.info.outputs.image }}
          echo "image_name=${image##*/}" >> "$GITHUB_OUTPUT"
          echo "registry_prefix=${image%/*}" >> "$GITHUB_OUTPUT"
          echo "version=${{ steps.info.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "name=${{ steps.info.outputs.name }}" >> "$GITHUB_OUTPUT"
          echo "description=${{ steps.info.outputs.description }}" >> "$GITHUB_OUTPUT"
          url=${{ steps.info.outputs.url }}
          if [[ -n "$url" && "$url" != "null" ]]; then
            echo "url=${url}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: "."
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            ${{ needs.prepare.outputs.url && format('io.hass.url={0}', needs.prepare.outputs.url) || '' }}
          push: true
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}

  publish-metadata:
    name: Publish metadata to SAE_App
    needs: manifest
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          path: src

      - name: Check out install repo (SAE_App)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          token: ${{ secrets.APP_REPO_TOKEN }}
          path: app

      - name: Assemble app metadata
        run: |
          set -e
          dest="app/${ADDON_SLUG}"
          mkdir -p "$dest"
          # Install repo only needs metadata (image is prebuilt) - no source/Dockerfile.
          cp src/config.yaml "$dest/config.yaml"
          cp src/README.md "$dest/README.md" 2>/dev/null || true
          cp src/CHANGELOG.md "$dest/CHANGELOG.md" 2>/dev/null || true
          cp src/icon.png "$dest/icon.png" 2>/dev/null || true
          cp src/logo.png "$dest/logo.png" 2>/dev/null || true
          rm -rf "$dest/translations"
          cp -r src/translations "$dest/translations" 2>/dev/null || true
          cp src/repository.yaml app/repository.yaml

      - name: Commit & push
        run: |
          cd app
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish ${ADDON_SLUG} $(date -u +%Y-%m-%dT%H:%M:%SZ)" || {
            echo "No changes to publish"; exit 0;
          }
          git push
