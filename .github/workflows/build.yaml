name: Smart Energy Agent Release Manager

# Shows the chosen target in the Actions list.
run-name: >-
  Release: ${{ github.event_name == 'workflow_dispatch' && inputs.target
  || (github.event_name == 'release' && 'Public' || 'Beta (auto)') }}

# Public  -> branch main, slug smart_energy_agent,      image smart_energy_agent
# Beta    -> branch beta, slug smart_energy_agent_beta, image smart_energy_agent_beta
on:
  push:
    branches: [main]          # every commit -> Beta
  release:
    types: [published]        # published release -> Public
  workflow_dispatch:
    inputs:
      target:
        description: "Build target"
        required: true
        default: "Beta"
        type: choice
        options:
          - "Beta"
          - "Public"

permissions:
  contents: read

env:
  APP_REPO: dneprojects/SAE_App
  ADDON_DIR: smart_energy_agent

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
      version: ${{ steps.channel.outputs.version }}
      branch: ${{ steps.channel.outputs.branch }}
      slug: ${{ steps.channel.outputs.slug }}
      appname: ${{ steps.channel.outputs.appname }}
      image_name: ${{ steps.channel.outputs.image_name }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Get app information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "."

      - name: Normalize app information
        id: normalize
        env:
          IMAGE: ${{ steps.info.outputs.image }}
          DESCRIPTION: ${{ steps.info.outputs.description }}
          URL: ${{ steps.info.outputs.url }}
        run: |
          echo "registry_prefix=${IMAGE%/*}" >> "$GITHUB_OUTPUT"
          echo "description=${DESCRIPTION}" >> "$GITHUB_OUTPUT"
          if [[ -n "$URL" && "$URL" != "null" ]]; then
            echo "url=${URL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine channel (Public vs Beta)
        id: channel
        env:
          BASE: ${{ steps.info.outputs.version }}
          NAME: ${{ steps.info.outputs.name }}
          EVENT: ${{ github.event_name }}
          TARGET: ${{ inputs.target }}
          RUN: ${{ github.run_number }}
        run: |
          if [[ "$EVENT" == "release" || "$TARGET" == "Public" ]]; then
            echo "mode=Public" >> "$GITHUB_OUTPUT"
            echo "version=${BASE}" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"
            echo "slug=smart_energy_agent" >> "$GITHUB_OUTPUT"
            echo "image_name=smart_energy_agent" >> "$GITHUB_OUTPUT"
            echo "appname=${NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=Beta" >> "$GITHUB_OUTPUT"
            echo "version=${BASE}-beta.${RUN}" >> "$GITHUB_OUTPUT"
            echo "branch=beta" >> "$GITHUB_OUTPUT"
            echo "slug=smart_energy_agent_beta" >> "$GITHUB_OUTPUT"
            echo "image_name=smart_energy_agent_beta" >> "$GITHUB_OUTPUT"
            echo "appname=${NAME} (Beta)" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.channel.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: "."
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.appname }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            ${{ needs.prepare.outputs.url && format('io.hass.url={0}', needs.prepare.outputs.url) || '' }}
          push: true
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}

  publish-metadata:
    name: Publish to SAE_App
    needs: [prepare, manifest]
    runs-on: ubuntu-latest
    env:
      BRANCH: ${{ needs.prepare.outputs.branch }}
      SLUG: ${{ needs.prepare.outputs.slug }}
      VERSION: ${{ needs.prepare.outputs.version }}
      APPNAME: ${{ needs.prepare.outputs.appname }}
      IMAGE_REF: ${{ needs.prepare.outputs.registry_prefix }}/${{ needs.prepare.outputs.image_name }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          path: src

      - name: Check out install repo (SAE_App)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          token: ${{ secrets.APP_REPO_TOKEN }}
          path: app

      - name: Switch to target branch
        run: |
          cd app
          git fetch origin "${BRANCH}" || true
          git switch "${BRANCH}" 2>/dev/null || git switch -c "${BRANCH}"

      - name: Assemble app metadata
        run: |
          set -e
          dest="app/${ADDON_DIR}"
          mkdir -p "$dest"
          cp src/config.yaml "$dest/config.yaml"
          cp src/README.md "$dest/README.md" 2>/dev/null || true
          cp src/CHANGELOG.md "$dest/CHANGELOG.md" 2>/dev/null || true
          cp src/icon.png "$dest/icon.png" 2>/dev/null || true
          cp src/logo.png "$dest/logo.png" 2>/dev/null || true
          rm -rf "$dest/translations"
          cp -r src/translations "$dest/translations" 2>/dev/null || true
          cp src/repository.yaml app/repository.yaml
          # Stamp channel-specific image, slug, name and version into config.yaml.
          sed -i -E "s#^image:.*#image: \"${IMAGE_REF}\"#" "$dest/config.yaml"
          sed -i -E "s/^slug:.*/slug: ${SLUG}/" "$dest/config.yaml"
          sed -i -E "s/^name:.*/name: ${APPNAME}/" "$dest/config.yaml"
          sed -i -E "s/^version:.*/version: \"${VERSION}\"/" "$dest/config.yaml"

      - name: Commit & push
        run: |
          cd app
          git config user.name "SmartEnergyAgent Bot"
          git config user.email "bot@smartenergyagent.local"
          git add -A
          git commit -m "Release ${SLUG} ${VERSION} (${BRANCH})" || {
            echo "No changes to publish"; exit 0;
          }
          git push origin "${BRANCH}"
