# Home Assistant App (formerly add-on) configuration for Smart Energy Agent.
# Phase 1: entity discovery, curation and monitoring
name: Smart Energy Agent
version: 0.2.1
slug: smart_energy_agent
description: >-
  Detects energy-related HA entities (power, energy, PV, grid, battery,
  consumers), classifies them and shows them live. Foundation for the later
  tariff- and PV-optimized control. (Phase 1: monitoring and curation.)
url: "https://github.com/dneprojects/SAE_App"
# Preferred reference: the generic multi-arch manifest image published by the
# CI workflow (publish-multi-arch-manifest). The Supervisor resolves the right
# architecture from the manifest.
image: "ghcr.io/dneprojects/smart_energy_agent"
arch:
  - aarch64
  - amd64
init: false
ingress: true
ingress_port: 7790
panel_icon: mdi:transmission-tower
panel_title: Smart Energy Agent
hassio_api: true
homeassistant_api: true
# Persistent storage for config (YAML) and history (SQLite).
map:
  - addon_config:rw
options:
  log_level: info
  # Storage location for the SQLite history AND all JSON settings (they live in
  # the same folder). Defaults to the host-mapped /addon_config so settings
  # survive an uninstall/reinstall; can be pointed to a mounted SSD/share later.
  history_db_path: "/addon_config/smart_energy_agent.db"
  # Hard cap for raw history retention (days) to protect SD-card lifetime.
  history_retention_days: 90
schema:
  log_level: list(debug|info|warning|error)?
  history_db_path: str?
  history_retention_days: int(1,3650)?
